<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PTMantra AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-icon">PT</div>
          <span class="logo-text">PTMantra</span>
        </div>
        <div class="sidebar-label">AI Listener</div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-info">
          <div class="info-row">
            <span class="info-dot active"></span>
            <span>Session active</span>
          </div>
          <div id="session-badge" class="session-badge hidden"></div>
        </div>
      </aside>

      <!-- Main chat panel -->
      <div class="chat-panel">

        <!-- Header -->
        <header class="chat-header">
          <div class="header-avatar">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="20" cy="20" r="20" fill="#e0e7ff"/>
              <path d="M20 12a4 4 0 100 8 4 4 0 000-8zm0 10c-4.418 0-8 2-8 4v1h16v-1c0-2-3.582-4-8-4z" fill="#4f46e5"/>
            </svg>
          </div>
          <div class="header-info">
            <div class="header-name">Healthcare Assistant</div>
            <div class="header-status"><span class="status-dot"></span> Online</div>
          </div>
          <div class="header-actions">
            <button id="tts-toggle" class="icon-btn active" title="Toggle voice replies">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            </button>
          </div>
        </header>

        <!-- Messages -->
        <section id="chat-window" class="chat-window"></section>

        <!-- Input bar -->
        <div class="input-bar">
          <form id="chat-form" class="chat-form">
            <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" />
            <button type="button" id="mic-btn" title="Hold to speak">
              <div class="mic-rings">
                <div class="ring r1"></div>
                <div class="ring r2"></div>
              </div>
              <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="2" width="6" height="13" rx="3"/>
                <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
              </svg>
            </button>
            <button type="submit" class="send-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </form>
          <div id="mic-status" class="mic-status hidden">Listening…</div>
        </div>

      </div>
    </div>

    <!-- Summary modal -->
    <div id="summary-overlay" class="summary-overlay hidden">
      <div class="summary-modal">
        <div class="summary-modal-header">
          <div class="summary-modal-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            Patient Summary
          </div>
          <button id="summary-close" class="icon-btn">✕</button>
        </div>
        <section id="summary-card" class="summary-card"></section>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
